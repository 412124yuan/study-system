<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲端讀書管理系統 Pro (單網頁整合版)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --warning-color: #f1c40f;
            --danger-color: #e74c3c;
            --dark-color: #2c3e50;
            --light-color: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f5f7fa;
            color: var(--dark-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* 最外層大框架（實現左右並排） */
        .main-wrapper {
            display: flex;
            gap: 25px;
            width: 100%;
            max-width: 1000px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 左側讀書主面板 */
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 550px;
            flex: 1;
            min-width: 350px;
        }

        /* 標題與登出列 */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header-row h1 { margin: 0; font-size: 1.5rem; }

        /* 密碼登入遮罩視窗 */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .input-group-vertical input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-buttons button { flex: 1; padding: 12px; font-size: 1rem; }
        .secondary-btn { background-color: #95a5a6; }

        /* Google 登入按鈕與分隔線 */
        .divider {
            margin: 20px 0;
            text-align: center;
            position: relative;
        }
        .divider::before {
            content: ""; position: absolute; top: 50%; left: 0; right: 0;
            height: 1px; background: #ddd; z-index: 1;
        }
        .divider span {
            background: white; padding: 0 15px; position: relative; z-index: 2; color: #95a5a6; font-size: 0.9rem;
        }
        .google-btn {
            width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 8px;
            background: white; color: #3c4043; font-size: 1rem; font-weight: 500;
            display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: background 0.2s;
        }
        .google-btn:hover { background: #f8f9fa; }
        .google-btn img { width: 20px; height: 20px; }

        /* 個人頭像區域 */
        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .avatar-wrapper {
            position: relative; width: 50px; height: 50px;
            border-radius: 50%; overflow: hidden; border: 2px solid var(--primary-color);
        }
        #user-avatar {
            width: 100%; height: 100%; object-fit: cover;
        }
        .upload-label {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.6); color: white; font-size: 0.7rem;
            text-align: center; padding: 2px 0; cursor: pointer;
            opacity: 0; transition: opacity 0.2s;
        }
        .avatar-wrapper:hover .upload-label { opacity: 1; }

        /* 今日總覽數據 */
        .overview-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #fdfdfd;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #eee;
            margin-top: 15px;
        }
        .total-time-box h3, .progress-box h3 { margin: 0 0 10px 0; font-size: 1rem; color: #7f8c8d; }
        #total-time-display {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--dark-color);
            background: #eef2f7;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        .progress-bar-container {
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }
        #progress-bar {
            width: 0%;
            background: var(--success-color);
            color: white;
            text-align: center;
            padding: 6px 0;
            font-size: 0.9rem;
            font-weight: bold;
            transition: width 0.4s ease;
        }

        /* 折線圖區塊 */
        .chart-section {
            margin-top: 25px;
            background: #fcfcfc;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #eee;
        }
        .chart-section h3 { margin: 0 0 15px 0; font-size: 0.95rem; color: #7f8c8d; }

        hr { border: 0; height: 1px; background: #ddd; margin: 25px 0; }

        /* 任務輸入框與清單 */
        .input-group { display: flex; margin-bottom: 20px; }
        #todo-input {
            flex: 1; padding: 12px; border: 2px solid #ddd;
            border-radius: 8px 0 0 8px; font-size: 1rem; outline: none;
        }
        #todo-input:focus { border-color: var(--primary-color); }
        #add-btn {
            padding: 0 20px; background: var(--primary-color); color: white;
            border: none; border-radius: 0 8px 8px 0; cursor: pointer; font-size: 1rem;
        }
        ul { list-style: none; padding: 0; margin: 0; }
        li {
            background: var(--light-color); padding: 15px; margin-bottom: 10px;
            border-radius: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        li.completed { background: #e8f8f5; opacity: 0.8; }
        li.completed .task-text { text-decoration: line-through; color: #95a5a6; }
        li.timing { border-left: 5px solid var(--primary-color); background: #ebf5fb; }
        .task-text { font-weight: 500; flex-grow: 1; margin-right: 10px; }

        /* 功能按鈕群組 */
        .btn-group { display: flex; gap: 5px; }
        .btn-group button { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; color: white; font-size: 0.85rem; }
        .start-btn { background: var(--success-color); }
        .pause-btn { background: var(--warning-color); color: #333; }
        .stop-btn { background: var(--dark-color); }
        .del-btn { background: var(--danger-color); }
        button:disabled { background: #bdc3c7; cursor: not-allowed; opacity: 0.6; }

        /* 右側音樂專區 */
        .music-container {
            background: white; padding: 30px; border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05); width: 100%;
            max-width: 380px; flex: 1; min-width: 320px;
        }
        .music-box { margin-bottom: 20px; }
        .music-box h3 { font-size: 0.95rem; color: #7f8c8d; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <h2>🔐 歡迎使用讀書管理系統</h2>
            <div class="input-group-vertical">
                <input type="email" id="auth-email" placeholder="電子郵件">
                <input type="password" id="auth-password" placeholder="密碼">
            </div>
            <div class="modal-buttons">
                <button id="login-btn">登入</button>
                <button id="register-btn" class="secondary-btn">註冊</button>
            </div>
            
            <div class="divider"><span>或</span></div>

            <button id="google-login-btn" class="google-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
                使用 Google 帳號登入
            </button>
        </div>
    </div>

    <div id="app-wrapper" class="main-wrapper" style="display: none;">
        
        <div class="container">
            <div class="header-row">
                <div class="user-profile">
                    <div class="avatar-wrapper">
                        <img id="user-avatar" src="https://via.placeholder.com/50" alt="大頭貼">
                        <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                        <label for="avatar-input" class="upload-label">更換</label>
                    </div>
                    <div>
                        <h1 id="welcome-title">📊 讀書管理儀表板</h1>
                        <span id="user-email-display" style="font-size: 0.85rem; color: #7f8c8d;"></span>
                    </div>
                </div>
                <button id="logout-btn" class="del-btn">登出</button>
            </div>

            <div class="overview-section">
                <div class="total-time-box">
                    <h3>今日總讀書時間</h3>
                    <div id="total-time-display">00 小時 00 分 00 秒</div>
                </div>
                
                <div class="progress-box">
                    <h3>今日任務完成率</h3>
                    <div class="progress-bar-container">
                        <div id="progress-bar">0%</div>
                    </div>
                </div>
            </div>

            <div class="chart-section">
                <h3>📈 每日閱讀時間曲線（近 7 日）</h3>
                <canvas id="studyChart"></canvas>
            </div>

            <hr>

            <div class="todo-section">
                <h2>📝 今日讀書任務</h2>
                <div class="input-group">
                    <input type="text" id="todo-input" placeholder="輸入你想讀的科目或任務...">
                    <button id="add-btn">新增任務</button>
                </div>
                <ul id="todo-list"></ul>
            </div>
        </div>

        <div class="music-container">
            <h2>🎵 專注音樂電台</h2>
            <div class="music-box">
                <h3>Spotify 專注歌單</h3>
                <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DWWQRwui0ExPn?utm_source=generator&theme=0" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
            <div class="music-box">
                <h3>YouTube Lofi 直播</h3>
                <iframe width="100%" height="200" src="https://www.youtube.com/embed/jfKfPfyJRdk" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 📥 填入您申請到的 Firebase 資料庫連線資訊
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // 初始化 Firebase 全域環境
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        // === 系統全域變數 ===
        let currentUser = null;
        let todos = [];
        let dailyHistory = {};
        let userAvatarBase64 = "";
        let currentTimingIndex = null;
        let timerInterval = null;
        let studyChart = null;

        // === DOM 元素快取 ===
        const authModal = document.getElementById('auth-modal');
        const appWrapper = document.getElementById('app-wrapper');
        const totalTimeDisplay = document.getElementById('total-time-display');
        const progressBar = document.getElementById('progress-bar');
        const todoInput = document.getElementById('todo-input');
        const todoList = document.getElementById('todo-list');
        const userAvatar = document.getElementById('user-avatar');
        const avatarInput = document.getElementById('avatar-input');
        const userEmailDisplay = document.getElementById('user-email-display');

        // 時間基準小工具
        function getTodayString() { return new Date().toISOString().split('T')[0]; }

        // === 1. 身分驗證模組 ===
        document.getElementById('register-btn').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            try { await createUserWithEmailAndPassword(auth, email, password); } catch (e) { alert("註冊失敗: " + e.message); }
        });

        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            try { await signInWithEmailAndPassword(auth, email, password); } catch (e) { alert("登入失敗: " + e.message); }
        });

        document.getElementById('google-login-btn').addEventListener('click', async () => {
            try { await signInWithPopup(auth, googleProvider); } catch (e) { alert("Google 登入失敗: " + e.message); }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            if (timerInterval) window.pauseTask(currentTimingIndex);
            signOut(auth);
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                authModal.style.display = 'none';
                appWrapper.style.display = 'flex';
                userEmailDisplay.textContent = user.email || "Google 登入用戶";
                initUserSync();
            } else {
                currentUser = null;
                authModal.style.display = 'flex';
                appWrapper.style.display = 'none';
            }
        });

        // === 2. Base64 檔案轉換與儲存 ===
        avatarInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 1024 * 1024) { alert("圖片過大，請選擇 1MB 以下的圖檔。"); return; }

            const reader = new FileReader();
            reader.onloadend = function () {
                userAvatarBase64 = reader.result;
                userAvatar.src = userAvatarBase64;
                saveToCloud();
            };
            reader.readAsDataURL(file);
        });

        // === 3. Firestore 資料流管理 ===
        function initUserSync() {
            const userDocRef = doc(db, "users", currentUser.uid);
            onSnapshot(userDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    todos = data.todos || [];
                    dailyHistory = data.dailyHistory || {};
                    userAvatarBase64 = data.avatar || "";
                    
                    if (userAvatarBase64) { userAvatar.src = userAvatarBase64; }
                    else if (currentUser.photoURL) { userAvatar.src = currentUser.photoURL; }
                } else {
                    todos = []; dailyHistory = {}; userAvatarBase64 = "";
                    saveToCloud();
                }
                renderTodos(); updateOverview(); updateChart();
            });
        }

        async function saveToCloud() {
            if (!currentUser) return;
            const userDocRef = doc(db, "users", currentUser.uid);
            await setDoc(userDocRef, {
                todos: todos,
                dailyHistory: dailyHistory,
                avatar: userAvatarBase64
            }, { merge: true });
        }

        // === 4. 系統格式化與儀表板渲染 ===
        function formatTime(totalSecs) {
            const hrs = Math.floor(totalSecs / 3600).toString().padStart(2, '0');
            const mins = Math.floor((totalSecs % 3600) / 60).toString().padStart(2, '0');
            const secs = (totalSecs % 60).toString().padStart(2, '0');
            return `${hrs} 小時 ${mins} 分 ${secs} 秒`;
        }

        function updateOverview() {
            const todaySeconds = dailyHistory[getTodayString()] || 0;
            totalTimeDisplay.textContent = formatTime(todaySeconds);
            if (todos.length === 0) { progressBar.style.width = '0%'; progressBar.textContent = '0%'; return; }
            const completedCount = todos.filter(t => t.completed).length;
            const percent = Math.round((completedCount / todos.length) * 100);
            progressBar.style.width = `${percent}%`; progressBar.textContent = `${percent}%`;
        }

        function updateChart() {
            const ctx = document.getElementById('studyChart').getContext('2d');
            const labels = []; const data = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date(); d.setDate(d.getDate() - i);
                const dateStr = d.toISOString().split('T')[0];
                labels.push(dateStr.substring(5));
                data.push(Math.round((dailyHistory[dateStr] || 0) / 60));
            }
            if (studyChart) {
                studyChart.data.labels = labels; studyChart.data.datasets[0].data = data; studyChart.update();
            } else {
                studyChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{ label: '閱讀時間 (分鐘)', data: data, borderColor: '#3498db', backgroundColor: 'rgba(52, 152, 219, 0.1)', borderWidth: 3, tension: 0.3, fill: true }]
                    },
                    options: { responsive: true, scales: { y: { beginAtZero: true } } }
                });
            }
        }

        function renderTodos() {
            todoList.innerHTML = '';
            todos.forEach((todo, index) => {
                const li = document.createElement('li');
                if (todo.completed) li.classList.add('completed');
                if (currentTimingIndex === index) li.classList.add('timing');
                const statusIcon = todo.completed ? '✅' : '⬜';
                const timeSpentText = todo.secondsSpent > 0 ? ` (${Math.floor(todo.secondsSpent/60)}分鐘)` : '';
                li.innerHTML = `
                    <span class="task-text">${statusIcon} ${todo.text}${timeSpentText}</span>
                    <div class="btn-group">
                        <button class="start-btn" onclick="startTask(${index})" ${todo.completed || currentTimingIndex === index ? 'disabled' : ''}>▶️</button>
                        <button class="pause-btn" onclick="pauseTask(${index})" ${currentTimingIndex !== index ? 'disabled' : ''}>⏸️</button>
                        <button class="stop-btn" onclick="stopTask(${index})" ${currentTimingIndex !== index ? 'disabled' : ''}>⏹️</button>
                        <button class="del-btn" onclick="deleteTask(${index})" ${currentTimingIndex === index ? 'disabled' : ''}>🗑️</button>
                    </div>
                `;
                todoList.appendChild(li);
            });
        }

        // === 5. 任務時間調度控制核心 (正向計時，掛載到 window 全域) ===
        window.startTask = function(index) {
            if (currentTimingIndex !== null && currentTimingIndex !== index) { alert(`您正在讀「${todos[currentTimingIndex].text}」喔！`); return; }
            currentTimingIndex = index; renderTodos();
            timerInterval = setInterval(() => {
                todos[index].secondsSpent = (todos[index].secondsSpent || 0) + 1;
                const todayStr = getTodayString();
                dailyHistory[todayStr] = (dailyHistory[todayStr] || 0) + 1;
                totalTimeDisplay.textContent = formatTime(dailyHistory[todayStr]);
            }, 1000);
        };

        window.pauseTask = function(index) { clearInterval(timerInterval); timerInterval = null; currentTimingIndex = null; saveToCloud(); };
        window.stopTask = function(index) { clearInterval(timerInterval); timerInterval = null; currentTimingIndex = null; todos[index].completed = true; saveToCloud(); };
        window.deleteTask = function(index) { todos.splice(index, 1); saveToCloud(); };

        // 新增事件
        document.getElementById('add-btn').addEventListener('click', addTodoElement);
        todoInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addTodoElement(); });

        function addTodoElement() {
            const text = todoInput.value.trim(); if (text === '') return;
            todos.push({ text: text, completed: false, secondsSpent: 0 });
            todoInput.value = ''; saveToCloud();
        }
    </script>
</body>
</html>
