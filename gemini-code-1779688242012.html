<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲端讀書管理系統 Pro (單網頁整合版)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --warning-color: #f1c40f;
            --danger-color: #e74c3c;
            --dark-color: #2c3e50;
            --light-color: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f5f7fa;
            color: var(--dark-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* 最外層大框架（實現左右並排） */
        .main-wrapper {
            display: flex;
            gap: 25px;
            width: 100%;
            max-width: 1000px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 左側讀書主面板 */
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 550px;
            flex: 1;
            min-width: 350px;
        }

        /* 標題與登出列 */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header-row h1 { margin: 0; font-size: 1.5rem; }

        /* 密碼登入遮罩視窗 */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .input-group-vertical input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-buttons button { flex: 1; padding: 12px; font-size: 1rem; }
        .secondary-btn { background-color: #95a5a6; }

        /* Google 登入按鈕與分隔線 */
        .divider {
            margin: 20px 0;
            text-align: center;
            position: relative;
        }
        .divider::before {
            content: ""; position: absolute; top: 50%; left: 0; right: 0;
            height: 1px; background: #ddd; z-index: 1;
        }
        .divider span {
            background: white; padding: 0 15px; position: relative; z-index: 2; color: #95a5a6; font-size: 0.9rem;
        }
        .google-btn {
            width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 8px;
            background: white; color: #3c4043; font-size: 1rem; font-weight: 500;
            display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: background 0.2s;
        }
        .google-btn:hover { background: #f8f9fa; }
        .google-btn img { width: 20px; height: 20px; }

        /* 個人頭像區域 */
        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .avatar
